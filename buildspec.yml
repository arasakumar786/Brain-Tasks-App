version: 0.2

env:
  parameter-store:
    DOCKER_USERNAME: /myapp/dockerhub/username
    DOCKER_PASSWORD: /myapp/dockerhub/password

phases:
  pre_build:
    commands:
      - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

  build:
    commands:
      - REPO=$DOCKER_USERNAME/brain-tasks-app
      - IMAGE_TAG=$CODEBUILD_RESOLVED_SOURCE_VERSION
      - docker build -t $REPO:$IMAGE_TAG .
      - docker tag $REPO:$IMAGE_TAG $REPO:latest

  post_build:
    commands:
      - REPO=$DOCKER_USERNAME/brain-tasks-app
      - IMAGE_TAG=$CODEBUILD_RESOLVED_SOURCE_VERSION
      - echo "REPO=$REPO"
      - echo "IMAGE_TAG=$IMAGE_TAG"
      - sed -i "s|IMAGE_PLACEHOLDER|$REPO:$IMAGE_TAG|g" deployment.yaml
      - echo "Updated deployment.yaml:"
      - cat deployment.yaml
      - docker push $REPO:$IMAGE_TAG
      - docker push $REPO:latest

artifacts:
  files:
    - deployment.yaml
    - service.yaml
  discard-paths: yes
